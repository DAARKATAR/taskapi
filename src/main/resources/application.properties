server.port=${PORT:10000}

# Configuraciˇn automatica de Base de Datos para Render
# Render inyecta la variable DATABASE_URL por defecto en algunos servicios
# pero nosotros usaremos las variables directas de spring
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Google Client ID (Frontend and Backend synchronization)
google.client.id=1059711129517-7c9c9tevfj9d1l1p9913jh54ks72s57f.apps.googleusercontent.com

