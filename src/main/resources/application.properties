server.port=10000

# Configuracion de Base de Datos para Render
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Logging para ver exactamente que falla
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
logging.level.com.example.taskapi=DEBUG

# Optimizacion de Pool de Conexiones (HikariCP) para Render Free Tier
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# Cache de Hibernate
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Google Client ID
google.client.id=1059711129517-7c9c9tevfj9d1l1p9913jh54ks72s57f.apps.googleusercontent.com

